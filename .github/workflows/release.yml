name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run release validation without publishing artifacts."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Release validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install backend dependencies
        run: uv sync --frozen --all-groups

      - name: Run backend tests
        run: uv run pytest

  docker-publish-placeholder:
    name: Docker publish placeholder
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ false }}

    steps:
      - name: Future Docker publish
        run: |
          echo "Docker image publishing is disabled until a packaging OpenSpec change adds a Dockerfile."

  packaging-not-ready:
    name: Packaging not ready
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Explain release scaffold
        run: |
          echo "Release validation passed."
          echo "Docker publishing is intentionally disabled until TablePro packaging exists."
